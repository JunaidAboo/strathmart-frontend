<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="Pasted code.css">
</head>

<body>

<!-- NAVBAR (matches your CSS exactly) -->
<nav>
    <a href="#" class="logo">
        <div class="logo-icon">S</div>
        <span>Strath<span><em>Mart</em></span></span>
    </a>

    <div class="nav-menu">
        <ul>
            <li><a href="#" class="active">Admin</a></li>
            <li><a href="/">Store</a></li>
        </ul>
    </div>
</nav>

<!-- HEADER -->
<div class="page-header">
    <h1>Admin Dashboard</h1>
    <p>Manage products</p>
</div>

<!-- MAIN -->
<div class="section">

    <!-- ADD PRODUCT -->
    <div class="form-container">
        <h2>Add Product</h2>

        <div class="form-group">
            <label>Name</label>
            <input type="text" id="name">
        </div>

        <div class="form-group">
            <label>Price</label>
            <input type="number" id="price">
        </div>

        <div class="form-group">
            <label>Image URL</label>
            <input type="text" id="image">
        </div>

        <button class="btn" onclick="addProduct()">Add Product</button>
    </div>

    <!-- PRODUCTS -->
    <div class="section-header">
        <h2>Products</h2>
    </div>

    <div id="productList" class="products-grid"></div>

</div>

<script>
const API_URL = "https://strathmart-api.onrender.com/products";

async function fetchProducts() {
    const res = await fetch(API_URL);
    const data = await res.json();

    const list = document.getElementById("productList");
    list.innerHTML = "";

    data.forEach(p => {
        list.innerHTML += `
        <div class="product-card">
            <img src="${p.image_url}">
            <div class="product-info">
                <h3>${p.name}</h3>
                <div class="price">KES ${p.price}</div>
                <button class="btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
            </div>
        </div>
        `;
    });
}

async function addProduct() {
    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;
    const image = document.getElementById("image").value;

    await fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name,
            price,
            image_url: image
        })
    });

    fetchProducts();
}

async function deleteProduct(id) {
    await fetch(`${API_URL}/${id}`, { method: "DELETE" });
    fetchProducts();
}

fetchProducts();
</script>

</body>
</html>
