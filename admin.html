<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">

<style>
body {
    font-family: Arial;
    background: #f5f6fa;
    margin: 0;
}

.container {
    display: flex;
}

.sidebar {
    width: 200px;
    background: #111;
    color: white;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    color: white;
    margin: 10px 0;
    text-decoration: none;
}

.main {
    flex: 1;
    padding: 20px;
}

.cards {
    display: flex;
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 150px;
    text-align: center;
}

.form {
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input {
    display: block;
    margin: 10px 0;
    padding: 10px;
    width: 100%;
}

button {
    padding: 10px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}

.product {
    background: white;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
    <h2>Admin Panel</h2>
    <a href="#">Dashboard</a>
    <a href="#">Products</a>
    <a href="#">Orders</a>
    <a href="#">Users</a>
</div>

<div class="main">
    <h1>Admin Dashboard</h1>
    <p>Manage your store easily</p>

    <div class="cards">
        <div class="card">
            📦 <br><span id="productCount">0</span> Products
        </div>
        <div class="card">
            🛒 <br>45 Orders
        </div>
        <div class="card">
            👤 <br>30 Users
        </div>
        <div class="card">
            💰 <br>$2,400
        </div>
    </div>

    <div class="form">
        <h3>Add Product</h3>
        <input id="name" placeholder="Product Name">
        <input id="price" placeholder="Price">
        <input id="category" placeholder="Category">
        <input id="desc" placeholder="Description">
        <button onclick="addProduct()">Add Product</button>
    </div>

    <h2>Products</h2>
    <div id="productList"></div>

</div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

function saveProducts() {
    localStorage.setItem("products", JSON.stringify(products));
}

function renderProducts() {
    let list = document.getElementById("productList");
    list.innerHTML = "";

    products.forEach((p, index) => {
        list.innerHTML += `
        <div class="product">
            <div>
                <b>${p.name}</b><br>
                $${p.price}
            </div>
            <button onclick="deleteProduct(${index})">Delete</button>
        </div>
        `;
    });

    document.getElementById("productCount").innerText = products.length;
}

function addProduct() {
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let category = document.getElementById("category").value;
    let desc = document.getElementById("desc").value;

    if (!name || !price) {
        alert("Fill all fields");
        return;
    }

    products.push({ name, price, category, desc });
    saveProducts();
    renderProducts();

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("category").value = "";
    document.getElementById("desc").value = "";
}

function deleteProduct(index) {
    products.splice(index, 1);
    saveProducts();
    renderProducts();
}

renderProducts();

</script>

</body>
</html>
